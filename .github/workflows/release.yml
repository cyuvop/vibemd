name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 'stable', check-latest: true }
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - run: go test ./... -timeout 30s

  build-mac:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 'stable', check-latest: true }

      - name: Install Wails and create-dmg
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          brew install create-dmg

      - name: Build universal binary
        run: ~/go/bin/wails build -platform darwin/universal -clean

      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          CERT_PASS: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -P "$CERT_PASS" -A -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          rm /tmp/cert.p12

      - name: Sign app
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk '{print $2}')
          codesign --deep --force --verify --verbose \
            --sign "$IDENTITY" \
            --options runtime \
            --entitlements /dev/null \
            build/bin/vibemd.app

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent build/bin/vibemd.app /tmp/vibemd-notarize.zip
          xcrun notarytool submit /tmp/vibemd-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple build/bin/vibemd.app

      - name: Package DMG
        run: |
          mkdir -p dist
          create-dmg \
            --volname "vibemd" \
            --window-size 540 380 \
            --icon-size 128 \
            --app-drop-link 380 190 \
            dist/vibemd-mac.dmg \
            build/bin/vibemd.app

      - uses: actions/upload-artifact@v4
        with:
          name: vibemd-mac
          path: dist/vibemd-mac.dmg

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 'stable', check-latest: true }
      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build Windows binary
        shell: bash
        run: ~/go/bin/wails build -platform windows/amd64 -clean
      - name: Package as zip
        shell: bash
        run: |
          mkdir -p dist
          cd build/bin && 7z a ../../dist/vibemd-windows.zip vibemd.exe
      - uses: actions/upload-artifact@v4
        with:
          name: vibemd-windows
          path: dist/vibemd-windows.zip

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            vibemd-mac/vibemd-mac.dmg
            vibemd-windows/vibemd-windows.zip
