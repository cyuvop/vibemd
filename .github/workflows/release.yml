name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 'stable', check-latest: true }
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
      - run: go test ./... -timeout 30s

  build-mac:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 'stable', check-latest: true }
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install create-dmg
        run: brew install create-dmg
      - name: Build universal binary
        run: ~/go/bin/wails build -platform darwin/universal -clean
      - name: Package DMG
        run: |
          mkdir -p dist
          create-dmg \
            --volname "vibemd" \
            --window-size 540 380 \
            --icon-size 128 \
            --app-drop-link 380 190 \
            dist/vibemd-mac.dmg \
            build/bin/vibemd.app
      - uses: actions/upload-artifact@v4
        with:
          name: vibemd-mac
          path: dist/vibemd-mac.dmg

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: 'stable', check-latest: true }
      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build Windows binary
        shell: bash
        run: ~/go/bin/wails build -platform windows/amd64 -clean
      - name: Package as zip
        shell: bash
        run: |
          mkdir -p dist
          cd build/bin && 7z a ../../dist/vibemd-windows.zip vibemd.exe
      - uses: actions/upload-artifact@v4
        with:
          name: vibemd-windows
          path: dist/vibemd-windows.zip

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            vibemd-mac/vibemd-mac.dmg
            vibemd-windows/vibemd-windows.zip
