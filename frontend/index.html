<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vibemd</title>
  <link rel="stylesheet" href="/style/nes.css" />
  <link rel="stylesheet" href="/style/base.css" />
  <link rel="stylesheet" href="/style/dark.css" />
  <link rel="stylesheet" href="/style/light.css" />
  <link rel="stylesheet" href="/style/markdown.css" />
</head>
<body class="dark">

  <header class="titlebar">
    <span class="titlebar-brand">▓▒░ VIBE·MD ░▒▓</span>
    <span class="titlebar-file" id="titlebar-filename">no file open</span>
    <button class="titlebar-help-btn" id="btn-help" title="Help">?</button>
  </header>

  <div id="help-overlay" aria-modal="true" role="dialog" hidden>
    <div class="help-dialog">
      <img src="/images/appicon.png" alt="vibemd logo" class="help-logo" />
      <p class="help-title">▓▒░ VIBE·MD ░▒▓</p>
      <p class="help-tagline">Markdown viewer for AI tools</p>
      <a class="help-link" id="help-github" href="#">github.com/cyuvop/vibemd</a>
      <button class="nes-btn help-close-btn" id="btn-help-close">CLOSE</button>
    </div>
  </div>

  <div id="busy-overlay" aria-hidden="true">
    <div class="busy-box">
      <span class="busy-spinner" id="busy-spinner">⣾</span>
      <span class="busy-label">LOADING</span>
    </div>
  </div>

  <div id="search-bar" hidden>
    <input id="search-input" type="text" placeholder="SEARCH..." autocomplete="off" spellcheck="false" />
    <span id="search-count"></span>
    <button class="search-btn" id="search-prev" title="Previous (Shift+Enter)">◄</button>
    <button class="search-btn" id="search-next" title="Next (Enter)">►</button>
    <button class="search-btn" id="search-close" title="Close (Esc)">✕</button>
  </div>

  <main id="content" class="markdown-body">
    <div class="splash">
      <p class="nes-text is-primary">VIBEMD v0.1</p>
      <p>Open a .md file to begin.</p>
      <p class="hint">vibemd path/to/file.md</p>
    </div>
  </main>

  <footer class="statusbar">
    <span class="status-chip" id="status-filename">—</span>
    <span class="status-chip" id="status-words">0 words</span>
    <button class="status-chip status-btn" id="btn-theme" title="Toggle theme">DARK</button>
    <span class="status-chip" id="status-mcp">MCP: OFF</span>
    <button class="status-chip status-btn" id="btn-linenum" title="Toggle line numbers"># LN</button>
    <button class="status-chip status-btn" id="btn-refresh" title="Reload file">↺ SYNC</button>
  </footer>

  <script src="/wails/ipc.js"></script>
  <script src="/main.js"></script>
</body>
</html>
